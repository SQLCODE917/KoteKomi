name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv run python scripts/generate_schemas.py
      - run: git diff --exit-code -- schemas
      - run: uv run ruff check
      - run: uv run pyright
      - run: uv run pytest
