[project]
name = "kotekomi-domain"
version = "0.1.0"
description = "KoteKomi Domain Core."
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.11,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kotekomi_domain"]
