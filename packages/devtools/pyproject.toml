[project]
name = "kotekomi-devtools"
version = "0.1.0"
description = "Repository-local agent harness tooling."
requires-python = ">=3.12,<3.13"
dependencies = [
  "jsonschema>=4.24,<5",
]

[project.scripts]
kotekomi-agent = "kotekomi_devtools.cli:entrypoint"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kotekomi_devtools"]
