[project]
name = "kotekomi-application"
version = "0.1.0"
description = "KoteKomi Application Layer."
requires-python = ">=3.12,<3.13"
dependencies = [
  "kotekomi-domain",
  "pydantic>=2.11,<3",
]

[tool.uv.sources]
kotekomi-domain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kotekomi_application"]
