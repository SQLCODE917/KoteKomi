[project]
name = "kotekomi-briefing"
version = "0.1.0"
description = "KoteKomi Briefing rendering."
requires-python = ">=3.12,<3.13"
dependencies = [
  "kotekomi-application",
  "kotekomi-domain",
]

[tool.uv.sources]
kotekomi-application = { workspace = true }
kotekomi-domain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kotekomi_briefing"]
